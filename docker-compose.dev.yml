
services:
  # PostgreSQL database for development
  postgres:
    image: postgres:17.4
    container_name: stock-system-postgres-dev
    environment:
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpassword
      POSTGRES_DB: stockdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Spring Boot backend application
  backend:
    image: eclipse-temurin:21-jdk
    container_name: stock-system-backend-dev
    working_dir: /app
    volumes:
      - ./stock-system-backend:/app  # Hot reload for development
      - ~/.m2:/root/.m2               # Maven cache
    command: ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments="-Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8787"
    ports:
      - "8080:8080"
      - "8787:8787"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    depends_on:
      - postgres

  # React frontend application
  frontend:
    image: node:25
    container_name: stock-system-frontend-dev
    working_dir: /app
    volumes:
      - ./stock-system-frontend:/app
    command: >
      sh -c "npm install &&
            npm run dev -- --host"
    ports:
      - "3001:5173"
    depends_on:
      - backend

  # Loki log aggregation
  loki:
    image: grafana/loki:latest
    container_name: stock-system-loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ./logging-config/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # Grafana Alloy
  alloy:
    image: grafana/alloy:latest
    container_name: stock-system-alloy-dev
    ports:
      - "12345:12345"
    volumes:
      - ./logging-config/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki

  # Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: stock-system-grafana-dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./logging-config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
  
  # Prometheus Metrics Server
  prometheus:
    image: prom/prometheus:latest
    container_name: stock-system-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./logging-config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

volumes:
  postgres-data:
  grafana-data:
  prometheus-data:
  loki-data: