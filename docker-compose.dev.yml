version: '3.9'

services:
  # PostgreSQL database for development
  postgres:
    image: postgres:17.4
    container_name: stock-system-postgres-dev
    environment:
      POSTGRES_USER: stockuser
      POSTGRES_PASSWORD: stockpassword
      POSTGRES_DB: stockdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Spring Boot backend application
  backend:
    image: eclipse-temurin:21-jdk
    container_name: stock-system-backend-dev
    working_dir: /app
    volumes:
      - ./stock-system-backend:/app  # Hot reload for development
      - ~/.m2:/root/.m2               # Maven cache
    command: ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments="-Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8787"
    ports:
      - "8080:8080"
      - "8787:8787"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    depends_on:
      - postgres

  # React frontend application
  frontend:
    image: node:25
    container_name: stock-system-frontend-dev
    working_dir: /app
    volumes:
      - ./stock-system-frontend:/app
    command: >
      sh -c "npm install &&
            npm run dev -- --host"
    ports:
      - "3001:5173"
    depends_on:
      - backend

  # Loki log aggregation
  loki:
    image: grafana/loki:latest
    container_name: stock-system-loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ./logging-config/loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  # Promtail log collector
  promtail:
    image: grafana/promtail:latest
    container_name: stock-system-promtail-dev
    volumes:
      - ./logging-config/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml

  # Grafana dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: stock-system-grafana-dev
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./logging-config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki

volumes:
  postgres-data:
  grafana-data:
  loki-data: