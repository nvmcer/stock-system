services:
  postgres:
    image: postgres:17.4
    container_name: ${COMPOSE_PROJECT_NAME:-stock-system-dev}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpassword}
      POSTGRES_DB: ${POSTGRES_DB:-stockdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5432}:5432"
    networks:
      - app

  api:
    image: eclipse-temurin:21-jdk
    container_name: ${COMPOSE_PROJECT_NAME:-stock-system-dev}-api
    working_dir: /app
    command: ./mvnw spring-boot:run -Dspring-boot.run.jvmArguments="-Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=0.0.0.0:8787"
    volumes:
      - ../../apps/api:/app
      - ~/.m2:/root/.m2
    ports:
      - "${API_PUBLIC_PORT:-8080}:8080"
      - "${API_DEBUG_PORT:-8787}:8787"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
    depends_on:
      - postgres

  web:
    image: node:25
    container_name: ${COMPOSE_PROJECT_NAME:-stock-system-dev}-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ../../apps/web:/app
    env_file:
      - ../env/dev/web.env
    ports:
      - "${WEB_PUBLIC_PORT:-3001}:5173"
    depends_on:
      - api
    networks:
      - app

volumes:
  postgres_data:
