services:
  loki:
    image: grafana/loki:latest
    container_name: ${COMPOSE_PROJECT_NAME:-stock-system-dev}-loki
    ports:
      - "${LOKI_PUBLIC_PORT:-3100}:3100"
    volumes:
      - ../observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app

  alloy:
    image: grafana/alloy:latest
    container_name: ${COMPOSE_PROJECT_NAME:-stock-system-dev}-alloy
    ports:
      - "${ALLOY_PUBLIC_PORT:-12345}:12345"
    volumes:
      - ../observability/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    depends_on:
      - loki
    networks:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-stock-system-dev}-grafana
    ports:
      - "${GRAFANA_PUBLIC_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
    networks:
      - app

  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-stock-system-dev}-prometheus
    ports:
      - "${PROMETHEUS_PUBLIC_PORT:-9090}:9090"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    networks:
      - app

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
