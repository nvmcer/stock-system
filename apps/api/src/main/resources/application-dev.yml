spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://postgres:5432/stockdb
    username: stockuser
    password: stockpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    mapping-resources:
      - META-INF/orm.xml
    properties:
      hibernate:
        "[format_sql]": false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.orm.jdbc.bind]": TRACE

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    prometheus:
      access: UNRESTRICTED
  metrics:
    tags:
      application: stock-system-api

app:
  admin:
    bootstrap:
      enabled: ${APP_ADMIN_BOOTSTRAP_ENABLED:false}
      username: ${APP_ADMIN_BOOTSTRAP_USERNAME:}
      password: ${APP_ADMIN_BOOTSTRAP_PASSWORD:}
