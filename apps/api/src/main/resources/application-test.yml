spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:stock-system-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  admin:
    bootstrap:
      enabled: false
      username: ""
      password: ""
